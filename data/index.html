<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPU-6050 Telemetry</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0a0c10; --surface:#111318; --border:#1e2330;
    --accent:#00e5ff; --accent2:#ff4081; --warn:#ffab00;
    --text:#cdd6f4; --muted:#45475a;
    --mono:'Share Tech Mono',monospace; --sans:'Barlow',sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); font-weight:300; min-height:100vh; display:flex; flex-direction:column; }
  .scanline { position:fixed; inset:0; pointer-events:none; z-index:100; background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px); }
  header { display:flex; align-items:center; justify-content:space-between; padding:18px 28px; border-bottom:1px solid var(--border); background:rgba(10,12,16,0.9); backdrop-filter:blur(12px); position:sticky; top:0; z-index:10; }
  .logo { font-family:var(--mono); font-size:13px; letter-spacing:0.12em; color:var(--accent); text-transform:uppercase; }
  .status-pill { display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:11px; color:var(--muted); border:1px solid var(--border); border-radius:20px; padding:5px 12px; }
  .dot { width:7px; height:7px; border-radius:50%; background:#00e676; box-shadow:0 0 8px #00e676; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  main { flex:1; padding:28px; display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:900px; margin:0 auto; width:100%; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:20px 24px; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .card.pitch::before { background:var(--accent); box-shadow:0 0 12px var(--accent); }
  .card.yaw::before   { background:var(--accent2); box-shadow:0 0 12px var(--accent2); }
  .card.roll::before  { background:var(--warn); box-shadow:0 0 12px var(--warn); }
  .card.temp::before  { background:#b47cff; box-shadow:0 0 12px #b47cff; }
  .card-label { font-family:var(--mono); font-size:10px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; margin-bottom:16px; }
  .big-value { font-family:var(--mono); font-size:52px; font-weight:400; line-height:1; }
  .big-value .unit { font-size:18px; color:var(--muted); margin-left:4px; }
  .pitch .big-value { color:var(--accent); }
  .yaw   .big-value { color:var(--accent2); }
  .gauges-row { grid-column:1/-1; display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .arc-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:20px 24px; display:flex; flex-direction:column; align-items:center; }
  .arc-card .card-label { align-self:flex-start; }
  .accel-card { grid-column:1/-1; }
  .accel-bars { display:grid; grid-template-columns:20px 1fr 64px; gap:8px 12px; align-items:center; margin-top:8px; }
  .axis-label { font-family:var(--mono); font-size:12px; color:var(--muted); }
  .bar-track { height:6px; background:var(--border); border-radius:3px; position:relative; }
  .bar-fill { height:100%; border-radius:3px; position:absolute; transition:width 0.2s,left 0.2s; }
  .bar-val { font-family:var(--mono); font-size:12px; text-align:right; }
  .log-card { grid-column:1/-1; }
  .log-inner { font-family:var(--mono); font-size:11px; color:var(--muted); height:70px; overflow-y:auto; line-height:1.8; border:1px solid var(--border); border-radius:4px; padding:8px 10px; margin-top:8px; }
  .log-entry { color:#4ade80; }
  footer { text-align:center; padding:14px; font-family:var(--mono); font-size:10px; color:var(--muted); border-top:1px solid var(--border); letter-spacing:0.08em; }
</style>
</head>
<body>
<div class="scanline"></div>
<header>
  <div class="logo">MPU-6050 // KALMAN TELEMETRY</div>
  <div class="status-pill"><div class="dot"></div><span id="status-txt">CONNECTING...</span></div>
</header>
<main>
  <div class="card pitch">
    <div class="card-label">// PITCH — kalman fused</div>
    <div class="big-value" id="pitch-val">--<span class="unit">°</span></div>
  </div>
  <div class="card yaw">
    <div class="card-label">// YAW — gyro integrated</div>
    <div class="big-value" id="yaw-val">--<span class="unit">°</span></div>
  </div>
  <div class="gauges-row">
    <div class="arc-card">
      <div class="card-label">// ROLL — kalman fused</div>
      <svg width="160" height="100" viewBox="0 0 160 100" overflow="visible">
        <path d="M10 90 A70 70 0 0 1 150 90" fill="none" stroke="#1e2330" stroke-width="8" stroke-linecap="round"/>
        <path id="roll-arc" d="M10 90 A70 70 0 0 1 150 90" fill="none" stroke="#ffab00" stroke-width="8" stroke-linecap="round" stroke-dasharray="220" stroke-dashoffset="110"/>
        <text x="80" y="82" text-anchor="middle" fill="#ffab00" font-family="'Share Tech Mono',monospace" font-size="22" id="roll-arc-val">0°</text>
        <text x="80" y="98" text-anchor="middle" fill="#45475a" font-family="'Share Tech Mono',monospace" font-size="9">–180°  +180°</text>
      </svg>
    </div>
    <div class="arc-card">
      <div class="card-label">// TEMPERATURE</div>
      <svg width="160" height="100" viewBox="0 0 160 100" overflow="visible">
        <path d="M10 90 A70 70 0 0 1 150 90" fill="none" stroke="#1e2330" stroke-width="8" stroke-linecap="round"/>
        <path id="temp-arc" d="M10 90 A70 70 0 0 1 150 90" fill="none" stroke="#b47cff" stroke-width="8" stroke-linecap="round" stroke-dasharray="220" stroke-dashoffset="110"/>
        <text x="80" y="82" text-anchor="middle" fill="#b47cff" font-family="'Share Tech Mono',monospace" font-size="22" id="temp-arc-val">--°C</text>
        <text x="80" y="98" text-anchor="middle" fill="#45475a" font-family="'Share Tech Mono',monospace" font-size="9">20°C  50°C</text>
      </svg>
    </div>
  </div>
  <div class="card accel-card">
    <div class="card-label">// ACCELEROMETER — raw (g)</div>
    <div class="accel-bars">
      <span class="axis-label" style="color:#00e5ff">X</span>
      <div class="bar-track"><div class="bar-fill" id="ax-bar" style="background:#00e5ff;width:0%;left:50%"></div></div>
      <span class="bar-val" style="color:#00e5ff" id="ax-val">0.000g</span>
      <span class="axis-label" style="color:#ff4081">Y</span>
      <div class="bar-track"><div class="bar-fill" id="ay-bar" style="background:#ff4081;width:0%;left:50%"></div></div>
      <span class="bar-val" style="color:#ff4081" id="ay-val">0.000g</span>
      <span class="axis-label" style="color:#ffab00">Z</span>
      <div class="bar-track"><div class="bar-fill" id="az-bar" style="background:#ffab00;width:0%;left:50%"></div></div>
      <span class="bar-val" style="color:#ffab00" id="az-val">1.000g</span>
    </div>
  </div>
  <div class="card log-card">
    <div class="card-label">// DATA STREAM</div>
    <div class="log-inner" id="log"></div>
  </div>
</main>
<footer>ESP32 · MPU-6050 · KALMAN FILTER · 10Hz REFRESH</footer>
<script>
function setArc(pathEl, valEl, value, min, max, suffix) {
  const pct = Math.max(0, Math.min(1, (value - min) / (max - min)));
  pathEl.style.strokeDashoffset = 220 - pct * 220;
  valEl.textContent = value.toFixed(1) + suffix;
}
function setBar(barEl, valEl, value) {
  const pct = Math.max(0, Math.min(1, (value + 2) / 4));
  if (value >= 0) {
    barEl.style.left = '50%';
    barEl.style.width = (pct - 0.5) * 100 + '%';
  } else {
    barEl.style.left = pct * 100 + '%';
    barEl.style.width = (0.5 - pct) * 100 + '%';
  }
  valEl.textContent = (value >= 0 ? '+' : '') + value.toFixed(3) + 'g';
}
function addLog(d) {
  const log = document.getElementById('log');
  const t = new Date().toLocaleTimeString('en-US',{hour12:false});
  const line = document.createElement('div');
  line.className = 'log-entry';
  line.textContent = `[${t}] pitch=${d.pitch.toFixed(2)}° yaw=${d.yaw.toFixed(2)}° roll=${d.roll.toFixed(2)}°`;
  log.appendChild(line);
  if (log.children.length > 20) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}
async function fetchData() {
  try {
    const res = await fetch('/data');
    const d = await res.json();
    document.getElementById('pitch-val').innerHTML = d.pitch.toFixed(1) + '<span class="unit">°</span>';
    document.getElementById('yaw-val').innerHTML   = d.yaw.toFixed(1)   + '<span class="unit">°</span>';
    setArc(document.getElementById('roll-arc'), document.getElementById('roll-arc-val'), d.roll, -180, 180, '°');
    setArc(document.getElementById('temp-arc'), document.getElementById('temp-arc-val'), d.temp, 20, 50, '°C');
    setBar(document.getElementById('ax-bar'), document.getElementById('ax-val'), d.ax);
    setBar(document.getElementById('ay-bar'), document.getElementById('ay-val'), d.ay);
    setBar(document.getElementById('az-bar'), document.getElementById('az-val'), d.az);
    addLog(d);
    document.getElementById('status-txt').textContent = 'LIVE — ' + location.hostname;
  } catch(e) {
    document.getElementById('status-txt').textContent = 'RECONNECTING...';
  }
}
setInterval(fetchData, 100);
fetchData();
</script>
</body>
</html>

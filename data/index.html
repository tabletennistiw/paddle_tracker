<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paddle Telemetry</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0d0f14; --surface:#111318; --border:#1e2330;
    --accent:#00e5ff; --accent2:#ff4081; --warn:#ffab00;
    --text:#cdd6f4; --muted:#45475a;
    --mono:'Share Tech Mono',monospace; --sans:'Barlow',sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); font-weight:300; min-height:100vh; display:flex; flex-direction:column; }
  .scanline { position:fixed; inset:0; pointer-events:none; z-index:100; background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px); }
  header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); background:rgba(13,15,20,0.96); backdrop-filter:blur(12px); position:sticky; top:0; z-index:10; }
  .logo { font-family:var(--mono); font-size:12px; letter-spacing:0.14em; color:var(--accent); text-transform:uppercase; }
  .status-pill { display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:11px; color:var(--muted); border:1px solid var(--border); border-radius:20px; padding:5px 12px; }
  .dot { width:7px; height:7px; border-radius:50%; background:#00e676; box-shadow:0 0 8px #00e676; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  main { flex:1; padding:20px; display:grid; grid-template-columns:1fr 1fr; gap:14px; max-width:1100px; margin:0 auto; width:100%; }
  .viz-card { grid-column:1/-1; background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; position:relative; height:340px; }
  .viz-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--accent); box-shadow:0 0 10px var(--accent); }
  #viz-label { position:absolute; top:12px; left:16px; font-family:var(--mono); font-size:10px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; z-index:2; pointer-events:none; }
  #three-canvas { width:100%!important; height:100%!important; display:block; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:18px 22px; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .card.pitch::before { background:var(--accent); }
  .card.roll::before  { background:var(--warn); }
  .card.yaw::before   { background:var(--accent2); }
  .card-label { font-family:var(--mono); font-size:10px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
  .big-value { font-family:var(--mono); font-size:46px; font-weight:400; line-height:1; }
  .big-value .unit { font-size:16px; color:var(--muted); margin-left:3px; }
  .pitch .big-value { color:var(--accent); }
  .roll  .big-value { color:var(--warn); }
  .yaw   .big-value { color:var(--accent2); }
  .accel-card { grid-column:1/-1; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:18px 22px; position:relative; overflow:hidden; }
  .accel-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .accel-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:4px; }
  .accel-axis { display:flex; flex-direction:column; gap:6px; }
  .accel-axis-label { font-family:var(--mono); font-size:10px; letter-spacing:0.15em; color:var(--muted); }
  .accel-val { font-family:var(--mono); font-size:28px; }
  .accel-bar-wrap { height:4px; background:var(--border); border-radius:2px; position:relative; }
  .accel-bar { height:100%; border-radius:2px; position:absolute; transition:width .12s,left .12s; }
  .log-card { grid-column:1/-1; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px 20px; }
  .log-inner { font-family:var(--mono); font-size:11px; color:var(--muted); height:60px; overflow-y:auto; line-height:1.8; border:1px solid var(--border); border-radius:4px; padding:6px 10px; margin-top:8px; }
  .log-entry { color:#4ade80; }
  footer { text-align:center; padding:12px; font-family:var(--mono); font-size:10px; color:var(--muted); border-top:1px solid var(--border); letter-spacing:0.08em; }
</style>
</head>
<body>
<div class="scanline"></div>
<header>
  <div class="logo">Paddle Telemetry // MPU-6050</div>
  <div class="status-pill"><div class="dot"></div><span id="status-txt">CONNECTING...</span></div>
</header>
<main>
  <div class="viz-card">
    <div id="viz-label">// 3D ORIENTATION — live paddle model</div>
    <canvas id="three-canvas"></canvas>
  </div>
  <div class="card pitch">
    <div class="card-label">// PITCH</div>
    <div class="big-value" id="pitch-val">--<span class="unit">°</span></div>
  </div>
  <div class="card roll">
    <div class="card-label">// ROLL</div>
    <div class="big-value" id="roll-val">--<span class="unit">°</span></div>
  </div>
  <div class="card yaw" style="grid-column:1/-1;">
    <div class="card-label">// YAW</div>
    <div class="big-value" id="yaw-val">--<span class="unit">°</span></div>
  </div>
  <div class="accel-card">
    <div class="card-label">// ACCELERATION (g)</div>
    <div class="accel-grid">
      <div class="accel-axis">
        <span class="accel-axis-label">X AXIS</span>
        <span class="accel-val" id="ax-val" style="color:var(--accent)">0.000</span>
        <div class="accel-bar-wrap"><div class="accel-bar" id="ax-bar" style="background:var(--accent);left:50%;width:0%"></div></div>
      </div>
      <div class="accel-axis">
        <span class="accel-axis-label">Y AXIS</span>
        <span class="accel-val" id="ay-val" style="color:var(--accent2)">0.000</span>
        <div class="accel-bar-wrap"><div class="accel-bar" id="ay-bar" style="background:var(--accent2);left:50%;width:0%"></div></div>
      </div>
      <div class="accel-axis">
        <span class="accel-axis-label">Z AXIS</span>
        <span class="accel-val" id="az-val" style="color:var(--warn)">1.000</span>
        <div class="accel-bar-wrap"><div class="accel-bar" id="az-bar" style="background:var(--warn);left:50%;width:0%"></div></div>
      </div>
    </div>
  </div>
  <div class="log-card">
    <div class="card-label">// DATA STREAM</div>
    <div class="log-inner" id="log"></div>
  </div>
</main>
<footer>ESP32 · MPU-6050 · KALMAN FILTER · LITTLEFS</footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="/viz.js"></script>
<script src="/ui.js"></script>
<script src="/data.js"></script>
</body>
</html>
